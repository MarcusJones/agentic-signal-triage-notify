# Sensor + cron registry — source of truth for the signal-triage-notify tap.
# Layer 1 sensors append to the resolved signals_dir (see _sensorlib.resolve_paths).
# Layer 2/3 are the signal-triage / signal-notify Hermes skills.
# setup.py (and its install-sensors.sh alias) read this and idempotently sync
# `hermes cron` jobs.
#
# Fields:
#   name       cron job name (unique)
#   layer      1=sensor, 2=triage, 3=notify
#   script     script filename, resolved under ~/.hermes/scripts/signal-triage-notify/
#              (Hermes only executes no-agent cron scripts from ~/.hermes/scripts/)
#   skill      skill name (agent jobs)
#   prompt     prompt for agent jobs
#   cadence    cron expression
#   category   daily-log section the sensor writes to (sensors only)
#   deliver    local | telegram | origin
#   enabled    true|false  (agent jobs start disabled until you enable them)

sensors:
  - name: gmail-poll
    layer: 1
    script: gmail_sensor.sh
    cadence: "*/15 * * * *"
    category: Email
    deliver: local
    enabled: true

  - name: github-poll
    layer: 1
    script: github_sensor.sh
    cadence: "50 * * * *"
    category: GitHub
    deliver: local
    enabled: true

  - name: weather-poll
    layer: 1
    script: weather_sensor.sh
    cadence: "0 5 * * *"
    category: Context
    deliver: local
    enabled: true

  - name: ics-poll
    layer: 1
    script: ics_sensor.sh
    cadence: "*/30 * * * *"
    category: Calendar
    deliver: local
    enabled: true

# Layer 2/3 agent jobs. `script` is the Layer-1.5 prefilter/wake-gate hook:
# its stdout is injected into the agent prompt; a last stdout line of
# {"wakeAgent": false} skips the LLM run entirely (poll-fast/flush-slow —
# the frequent polls below are free when gated). Optional per-job `model:` /
# `provider:` route scheduled judging to a cheaper model than your
# interactive default. Set `prefilter: false` on a job to opt out of the
# script hook (v0.1 behavior).
agents:
  - name: signal-triage
    layer: 2
    skill: signal-triage
    script: triage_prefilter.sh
    cadence: "*/15 6-23 * * *"
    deliver: local
    enabled: false   # enable after watching the triage log for a few days
    # model: ""      # optional cheap-model override; verify your endpoint's allow-list
    prompt: >-
      Autonomous triage sweep. Load and follow the signal-triage skill.
      Do not ask questions. A deterministic prefilter block at the top of
      this prompt lists the NEW items with source ids pre-derived — trust it
      for discovery and classify them, write the triage log, and propose
      actions into the ledger. Do not send notifications or write the
      calendar yourself — that is signal-notify's job.

  - name: signal-notify
    layer: 3
    skill: signal-notify
    script: notify_prefilter.sh
    cadence: "5,35 6-23 * * *"
    deliver: telegram
    enabled: false   # enable after triage output looks right
    # model: ""      # optional cheap-model override; verify your endpoint's allow-list
    prompt: >-
      Autonomous notify dispatch. Load and follow the signal-notify skill.
      Do not ask questions. Execute pending actions from the ledger:
      create attendee-free calendar events with reminders, and alert on the
      configured channel for URGENT items. Mark each action done/failed. If
      nothing is pending, respond with a single line beginning [SILENT].
